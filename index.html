<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фото архив</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Моя фотобаза</h2>

    <input
        id="album"
        type="text"
        placeholder="Альбом">

    <br>

    <input
        id="search"
        type="text"
        placeholder="Поиск по альбому или дате"
        oninput="searchPhotos()">

    <br>

    <video
        id="camera"
        autoplay
        playsinline
        muted>
    </video>

    <br>

    <button onclick="makePhoto()">
        📷 Фото
    </button>

    <button onclick="exportPhotos()">
        💾 Экспорт
    </button>

    <div id="gallery"></div>

    <script src="app.js"></script>

</body>
</html>

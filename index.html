<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Моя фотобаза</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <!-- Верхня панель -->
  <div class="header">
    <h1>📸 FOTOfLEX</h1>
    <div class="subtitle">Зберігання · керування · оригінали</div>
  </div>

  <!-- Альбом та пошук -->
  <div class="controls">
    <div class="field-group">
      <label>📁 Альбом</label>
      <input id="album" type="text" placeholder="Назва альбому">
    </div>
    <div class="field-group">
      <label>🔍 Пошук</label>
      <input id="search" type="text" placeholder="Пошук по альбому або даті" oninput="searchPhotos()">
    </div>
  </div>

  <!-- КАМЕРА НА ВЕСЬ ЕКРАН -->
  <div class="camera-fullscreen" id="cameraWrapper">
    <video id="camera" autoplay playsinline muted></video>
    <div id="cameraPlaceholder" class="camera-placeholder">
      <span>📷</span>
      <p>Натисніть кнопку <strong>«Фото»</strong><br>для доступу до камери</p>
      <button onclick="startCamera()" class="btn-camera-start">▶ Включити камеру</button>
    </div>
    <!-- Індикатор статусу -->
    <div id="cameraStatus" class="camera-status">⏳ Камера не активна</div>
  </div>

  <!-- Кнопки -->
  <div class="button-group">
    <button onclick="makePhoto()" class="btn btn-primary" id="photoBtn">📷 Фото</button>
    <button onclick="exportPhotos()" class="btn btn-secondary">💾 Експорт</button>
  </div>

  <!-- Галерея -->
  <div id="gallery"></div>
  <div id="photoCount" class="photo-count"></div>
</div>

<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Моя фотобаза · повноекранна камера</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #0a0202;
      min-height: 100vh;
      padding: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 480px;
      width: 100%;
      background: linear-gradient(145deg, #2d0a0a, #1a0606);
      border-radius: 28px;
      padding: 16px 16px 20px;
      box-shadow: 0 12px 48px rgba(255, 50, 0, 0.25);
      border: 1px solid rgba(255, 200, 0, 0.12);
    }

    /* Заголовок */
    .header {
      text-align: center;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(255, 200, 0, 0.15);
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #ff7a3a, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .header .subtitle {
      color: #ffd700;
      font-size: 13px;
      opacity: 0.65;
      margin-top: 2px;
      letter-spacing: 1.5px;
    }

    /* Групи полів */
    .field-group {
      margin-bottom: 12px;
    }
    .field-group label {
      display: block;
      color: #ffd700;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: 0.3px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      background: rgba(60, 20, 20, 0.8);
      border: 2px solid rgba(255, 200, 0, 0.12);
      border-radius: 12px;
      color: #fff;
      transition: all 0.25s;
      outline: none;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }
    input:focus {
      border-color: #ffd700;
      box-shadow: 0 0 0 4px rgba(255, 200, 0, 0.08);
      background: rgba(80, 30, 30, 0.9);
    }

    /* КАМЕРА — майже весь екран */
    .camera-wrapper {
      background: #0a0000;
      border-radius: 20px;
      overflow: hidden;
      margin: 12px 0 14px;
      aspect-ratio: 16 / 9;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 2px solid rgba(255, 200, 0, 0.08);
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.7);
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      background: #000;
    }
    .camera-placeholder {
      color: #fff;
      text-align: center;
      padding: 16px;
    }
    .camera-placeholder span {
      font-size: 58px;
      display: block;
      margin-bottom: 6px;
    }
    .camera-placeholder p {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 12px;
    }
    .btn-camera-start {
      background: linear-gradient(135deg, #ff6b35, #e63900);
      color: #fff;
      border: none;
      padding: 12px 26px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(255, 80, 0, 0.4);
      letter-spacing: 0.5px;
    }
    .btn-camera-start:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 28px rgba(255, 80, 0, 0.5);
    }

    /* Кнопки дій */
    .button-group {
      display: flex;
      gap: 12px;
      margin: 8px 0 14px;
    }
    .btn {
      flex: 1;
      padding: 16px 12px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #ff6b35, #e63900);
      color: #fff;
      box-shadow: 0 4px 16px rgba(255, 80, 0, 0.35);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255, 80, 0, 0.45);
    }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: linear-gradient(135deg, #ffd700, #f0a500);
      color: #1a0a0a;
      box-shadow: 0 4px 16px rgba(255, 215, 0, 0.2);
    }
    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255, 215, 0, 0.3);
    }

    /* Галерея — фото більшого формату */
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    .card {
      background: rgba(50, 18, 18, 0.7);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 200, 0, 0.08);
      transition: all 0.25s;
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 200, 0, 0.25);
      box-shadow: 0 8px 24px rgba(255, 60, 0, 0.18);
    }
    .photo {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #1a0a0a;
    }
    .card .info {
      padding: 8px 10px 4px;
    }
    .card .small {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.4;
      word-break: break-word;
    }
    .card .album-name {
      font-weight: 600;
      color: #ffd700;
      font-size: 12px;
    }
    .card-actions {
      display: flex;
      gap: 6px;
      padding: 4px 10px 10px;
      flex-wrap: wrap;
    }
    .card-actions button {
      flex: 1;
      padding: 7px 6px;
      font-size: 11px;
      border-radius: 30px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 48px;
    }
    .btn-open {
      background: linear-gradient(135deg, #ff6b35, #e63900);
      color: #fff;
      box-shadow: 0 2px 8px rgba(255, 80, 0, 0.3);
    }
    .btn-open:hover {
      transform: scale(1.04);
    }
    .btn-download {
      background: rgba(255, 215, 0, 0.15);
      color: #ffd700;
      border: 1px solid rgba(255, 215, 0, 0.2);
    }
    .btn-download:hover {
      background: rgba(255, 215, 0, 0.25);
    }
    .btn-delete {
      background: rgba(255, 70, 70, 0.12);
      color: #ff6b6b;
      border: 1px solid rgba(255, 70, 70, 0.15);
    }
    .btn-delete:hover {
      background: rgba(255, 70, 70, 0.25);
    }

    .photo-count {
      color: rgba(255, 255, 255, 0.3);
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      letter-spacing: 0.3px;
    }

    /* анімація */
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 4px rgba(255, 215, 0, 0.05); }
      50% { box-shadow: 0 0 18px rgba(255, 215, 0, 0.15); }
    }
    input:focus {
      animation: glow 1.8s ease-in-out infinite;
    }

    /* адаптив */
    @media (max-width: 420px) {
      .container { padding: 12px; }
      .header h1 { font-size: 22px; }
      .btn { font-size: 14px; padding: 14px 10px; }
      #gallery { grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 10px; }
    }
    @media (min-width: 600px) {
      #gallery { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Заголовок -->
  <div class="header">
    <h1>📸 Моя фотобаза</h1>
    <div class="subtitle">Зберігання · керування · оригінали</div>
  </div>

  <!-- Альбом + пошук -->
  <div class="field-group">
    <label>📁 Альбом</label>
    <input id="album" type="text" placeholder="Назва альбому (напр. Подорож)">
  </div>
  <div class="field-group">
    <label>🔍 Пошук</label>
    <input id="search" type="text" placeholder="Пошук по альбому або даті" oninput="searchPhotos()">
  </div>

  <!-- КАМЕРА майже весь екран (aspect 16/9) -->
  <div class="camera-wrapper">
    <video id="camera" autoplay playsinline muted style="display:none;"></video>
    <div id="cameraPlaceholder" class="camera-placeholder">
      <span>📷</span>
      <p>Натисніть «Фото»<br>для доступу до камери</p>
      <button onclick="startCamera()" class="btn-camera-start">▶ Включити камеру</button>
    </div>
  </div>

  <!-- Кнопки -->
  <div class="button-group">
    <button onclick="makePhoto()" class="btn btn-primary" id="photoBtn">📷 Фото</button>
    <button onclick="exportPhotos()" class="btn btn-secondary">💾 Експорт</button>
  </div>

  <!-- Галерея + лічильник -->
  <div id="gallery"></div>
  <div id="photoCount" class="photo-count"></div>
</div>

<script>
  (function(){
    "use strict";

    // DOM
    const video = document.getElementById("camera");
    const gallery = document.getElementById("gallery");
    const albumInput = document.getElementById("album");
    const searchInput = document.getElementById("search");
    const cameraPlaceholder = document.getElementById("cameraPlaceholder");
    const photoBtn = document.getElementById("photoBtn");
    const photoCount = document.getElementById("photoCount");

    let db;
    let stream = null;
    let cameraReady = false;

    // ========== IndexedDB ==========
    const req = indexedDB.open("PhotoBase", 1);
    req.onupgradeneeded = (e) => {
      db = e.target.result;
      if (!db.objectStoreNames.contains("photos")) {
        const store = db.createObjectStore("photos", { keyPath: "id" });
        store.createIndex("date", "date");
        store.createIndex("album", "album");
      }
    };
    req.onsuccess = (e) => {
      db = e.target.result;
      loadPhotos();
    };
    req.onerror = () => alert("❌ Помилка відкриття бази");

    // ========== Камера ==========
    function startCamera() {
      if (cameraReady) return;

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert("❌ Ваш браузер не підтримує камеру");
        return;
      }

      cameraPlaceholder.innerHTML = `<span>⏳</span><p>Запит доступу до камери...</p>`;

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      })
      .then((s) => {
        stream = s;
        video.srcObject = stream;
        video.style.display = "block";
        cameraPlaceholder.style.display = "none";
        cameraReady = true;
        photoBtn.disabled = false;
        video.play().catch(e => console.warn("play", e));
      })
      .catch(() => {
        // спроба з передньою
        navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        })
        .then((s) => {
          stream = s;
          video.srcObject = stream;
          video.style.display = "block";
          cameraPlaceholder.style.display = "none";
          cameraReady = true;
          photoBtn.disabled = false;
          video.play().catch(e => console.warn("play front", e));
        })
        .catch(() => {
          cameraPlaceholder.innerHTML = `
            <span>❌</span>
            <p>Не вдалося відкрити камеру</p>
            <p style="font-size:12px;opacity:0.5;margin-top:4px;">Перевірте дозволи</p>
            <button onclick="startCamera()" class="btn-camera-start" style="margin-top:10px;">🔄 Спробувати</button>
          `;
        });
      });
    }

    // ========== Фото ==========
    function makePhoto() {
      if (!db) { alert("❌ База завантажується"); return; }
      if (!cameraReady) {
        startCamera();
        setTimeout(() => {
          if (!cameraReady) {
            alert("❌ Камера не доступна. Дозвольте доступ.");
            return;
          }
          capturePhoto();
        }, 900);
        return;
      }
      capturePhoto();
    }

    function capturePhoto() {
      // великий кадр (оригінал)
      const bigCanvas = document.createElement("canvas");
      bigCanvas.width = 1280;
      bigCanvas.height = 720;
      const ctx = bigCanvas.getContext("2d");
      ctx.drawImage(video, 0, 0, 1280, 720);
      const bigDataURL = bigCanvas.toDataURL("image/webp", 0.92); // висока якість

      // прев'ю (більше, ніж раніше — 320x320)
      const smallCanvas = document.createElement("canvas");
      smallCanvas.width = 320;
      smallCanvas.height = 320;
      const s = smallCanvas.getContext("2d");
      s.drawImage(video, 0, 0, 320, 320);
      const smallDataURL = smallCanvas.toDataURL("image/webp", 0.78);

      const item = {
        id: Date.now(),
        small: smallDataURL,
        big: bigDataURL,            // оригінал у повній якості
        album: albumInput.value.trim() || "Без альбома",
        date: new Date().toLocaleString()
      };

      const tx = db.transaction("photos", "readwrite");
      tx.objectStore("photos").add(item);
      showCard(item);
      updateCount();
    }

    // ========== Відображення картки ==========
    function showCard(p) {
      const box = document.createElement("div");
      box.className = "card";
      box.innerHTML = `
        <img class="photo" src="${p.small}" alt="Фото" loading="lazy">
        <div class="info">
          <div class="small album-name">📁 ${p.album}</div>
          <div class="small">📅 ${p.date}</div>
        </div>
        <div class="card-actions">
          <button onclick="openPhoto(${p.id})" class="btn-open">👁️</button>
          <button onclick="downloadOriginal(${p.id})" class="btn-download">⬇️</button>
          <button onclick="delPhoto(${p.id}, this)" class="btn-delete">✕</button>
        </div>
      `;
      gallery.appendChild(box);
    }

    // ========== Завантаження всіх ==========
    function loadPhotos() {
      gallery.innerHTML = "";
      const tx = db.transaction("photos", "readonly");
      const store = tx.objectStore("photos");
      const req = store.openCursor();
      req.onsuccess = (e) => {
        const cursor = e.target.result;
        if (cursor) {
          showCard(cursor.value);
          cursor.continue();
        }
      };
      updateCount();
    }

    // ========== Відкрити оригінал (у новій вкладці) ==========
    window.openPhoto = function(id) {
      const tx = db.transaction("photos", "readonly");
      tx.objectStore("photos").get(id).onsuccess = (e) => {
        const p = e.target.result;
        if (!p) return;
        const win = window.open("", "_blank");
        if (!win) { alert("⚠️ Дозвольте спливаючі вікна для перегляду"); return; }
        win.document.write(`
          <!DOCTYPE html>
          <html><head><meta name="viewport" content="width=device-width,initial-scale=1.0">
          <style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;}
          img{max-width:100%;max-height:100vh;object-fit:contain;}</style></head>
          <body><img src="${p.big}" alt="Фото"></body></html>
        `);
      };
    };

    // ========== ЗАВАНТАЖИТИ ОРИГІНАЛ (повна якість) ==========
    window.downloadOriginal = function(id) {
      const tx = db.transaction("photos", "readonly");
      tx.objectStore("photos").get(id).onsuccess = (e) => {
        const p = e.target.result;
        if (!p) return;
        // завантаження через посилання
        const link = document.createElement("a");
        link.href = p.big;
        link.download = `photo_${p.id}.webp`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };
    };

    // ========== Видалити ==========
    window.delPhoto = function(id, el) {
      if (!confirm("🗑️ Видалити це фото?")) return;
      const tx = db.transaction("photos", "readwrite");
      tx.objectStore("photos").delete(id);
      const card = el.closest('.card');
      if (card) card.remove();
      updateCount();
    };

    // ========== Пошук ==========
    window.searchPhotos = function() {
      const text = searchInput.value.toLowerCase();
      document.querySelectorAll(".card").forEach(card => {
        const match = card.innerText.toLowerCase().includes(text);
        card.style.display = match ? "flex" : "none";
      });
    };

    // ========== Експорт JSON ==========
    window.exportPhotos = function() {
      const tx = db.transaction("photos", "readonly");
      const store = tx.objectStore("photos");
      const all = [];
      store.openCursor().onsuccess = (e) => {
        const c = e.target.result;
        if (c) { all.push(c.value); c.continue(); }
        else {
          if (!all.length) { alert("❌ Немає фото"); return; }
          const json = JSON.stringify(all, null, 2);
          const blob = new Blob([json], { type: "application/json" });
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = `photos_${new Date().toISOString().slice(0,10)}.json`;
          a.click();
        }
      };
    };

    // ========== Лічильник ==========
    function updateCount() {
      if (!db) return;
      const tx = db.transaction("photos", "readonly");
      const countReq = tx.objectStore("photos").count();
      countReq.onsuccess = () => {
        const total = countReq.result;
        photoCount.textContent = total ? `📸 Всього фото: ${total}` : '';
      };
    }

    // ========== Клік по кнопці Фото — якщо камера не готова, стартуємо ==========
    photoBtn.addEventListener('click', () => {
      if (!cameraReady) startCamera();
    });

    // ========== додаткове: якщо камера вже запущена, приховати плейсхолдер ==========
    // невелика перевірка при завантаженні
    window.addEventListener('load', function() {
      // якщо користувач вже надав дозвіл раніше — можна спробувати стартувати автоматично,
      // але залишимо за кнопкою.
    });
  })();
</script>
</body>
</html>

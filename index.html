<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Моя фотобаза</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Заголовок -->
        <div class="header">
            <h1>📸 Моя фотобаза</h1>
            <div class="subtitle">Зберігання та керування фото</div>
        </div>

        <!-- Альбом -->
        <div class="field-group">
            <label>📁 Альбом</label>
            <input id="album" type="text" placeholder="Назва альбому">
        </div>

        <!-- Поиск -->
        <div class="field-group">
            <label>🔍 Пошук</label>
            <input id="search" type="text" placeholder="Пошук по альбому або даті" oninput="searchPhotos()">
        </div>

        <!-- Камера -->
        <div class="camera-wrapper">
            <video id="camera" autoplay playsinline muted style="display:none;"></video>
            <div id="cameraPlaceholder" class="camera-placeholder">
                <span>📷</span>
                <p>Натисніть кнопку "Фото"<br>для доступу до камери</p>
                <button onclick="startCamera()" class="btn-camera-start">▶ Включити камеру</button>
            </div>
        </div>

        <!-- Кнопки -->
        <div class="button-group">
            <button onclick="makePhoto()" class="btn btn-primary" id="photoBtn">📷 Фото</button>
            <button onclick="exportPhotos()" class="btn btn-secondary">💾 Експорт</button>
        </div>

        <!-- Галерея -->
        <div id="gallery"></div>
        <div id="photoCount" class="photo-count"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
